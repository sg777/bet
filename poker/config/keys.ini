# Verus IDs and Keys Configuration (local VRSCTEST regtest)
# This file allows you to configure identity names and key prefixes
# without recompiling the code.

[identities]
# Parent identity (root namespace) — also a token currency that issues sub-IDs
parent_id = sg777z.VRSCTEST@

# Test identity for development/testing ID updates
test_id = test.sg777z.VRSCTEST@

# Cashier aggregator identity (holds cashier list)
cashier_id = cashier.sg777z.VRSCTEST@

# Dealer aggregator identity (holds dealer list)
dealer_id = dealer.sg777z.VRSCTEST@

# Short names — these must match the on-chain identity short names.
# In this test setup we registered "cashier" and "dealer" (singular).
cashiers_short = cashier
dealers_short = dealer
poker_short = poker

[keys]
# Base prefix for all VDXF keys. This is an opaque namespace string and does
# not have to match the chain name; we keep it as the production prefix so
# the same keys.ini format stays portable across chains.
key_prefix = chips.vrsc::poker.sg777z.

# Short key names (prefix will be added automatically by get_full_key)
cashiers_key = cashiers
dealers_key = dealers
t_game_id_key = t_game_ids
t_table_info_key = t_table_info
t_player_info_key = t_player_info
